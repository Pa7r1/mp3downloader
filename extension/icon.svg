<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="6" x2="64" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3b3b"/>
      <stop offset="1" stop-color="#c41f1f"/>
    </linearGradient>
    <linearGradient id="sheen" x1="64" y1="6" x2="64" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fondo redondeado con gradiente rojo de marca -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bg)"/>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#sheen)"/>

  <!-- flecha de descarga (eje + cabeza) -->
  <g fill="#ffffff">
    <rect x="55" y="26" width="18" height="34" rx="5"/>
    <path d="M40 56 H88 L64 90 Z"/>
  </g>

  <!-- bandeja receptora -->
  <path d="M40 100 H88" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
</svg>
